<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lucas English Learning</title>
    <link rel="stylesheet" href="styles.css?v=20260610-6" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="cards/local-cards.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="英语学习卡片">
        <header class="topbar">
          <h1>Lucas English Learning</h1>
          <label class="group-filter">
            <span>分组</span>
            <select id="groupFilter">
              <option value="all">全部</option>
            </select>
          </label>
          <button class="test-button" id="openTestButton" type="button">测试</button>
          <button class="settings-button" id="settingsButton" type="button" aria-label="打开设置">
            设置
          </button>
        </header>

        <section class="card-stage" aria-live="polite">
          <button class="nav-button previous" id="previousButton" type="button" aria-label="上一张" title="上一张">
            <span aria-hidden="true">&#8592;</span>
          </button>
          <article class="study-card" id="studyCard">
            <div class="photo-panel" id="photoPanel">
              <img id="cardImage" alt="" hidden />
              <div class="empty-illustration" id="emptyIllustration" aria-hidden="true">
                <div class="sun"></div>
                <div class="hill hill-one"></div>
                <div class="hill hill-two"></div>
                <div class="tree">
                  <span></span>
                  <span></span>
                </div>
              </div>
            </div>

            <div class="word-panel">
              <p class="card-count" id="cardCount">0 / 0</p>
              <h2 id="englishWord">先添加一张卡片</h2>
              <p id="chineseWord">拍照上传图片，再填写英文和中文</p>
            </div>
          </article>
          <button class="nav-button next" id="nextButton" type="button" aria-label="下一张" title="下一张">
            <span aria-hidden="true">&#8594;</span>
          </button>
        </section>

        <section class="controls" aria-label="卡片操作">
          <button class="speak-button english" id="speakEnglishButton" type="button">
            <span class="button-main">English</span>
            <span class="button-sub">读英文</span>
          </button>
          <button class="speak-button chinese" id="speakChineseButton" type="button">
            <span class="button-main">中文</span>
            <span class="button-sub">读中文</span>
          </button>
        </section>
      </section>

      <aside class="side-panel" id="settingsPanel" aria-label="设置" aria-hidden="true">
        <div class="panel-header">
          <h2>设置</h2>
          <button class="text-button" id="closeSettingsButton" type="button">关闭</button>
        </div>

        <section class="settings-panel" aria-label="设置">
          <h3>发音</h3>
          <label class="settings-field" for="englishAccentSelect">
            英文发音
            <select id="englishAccentSelect">
              <option value="en-GB" selected>英式</option>
              <option value="en-US">美式</option>
            </select>
          </label>
          <label class="settings-field" for="englishVoiceSelect">
            英文语音
            <select id="englishVoiceSelect">
              <option value="auto">自动优选</option>
            </select>
          </label>
          <label class="settings-field" for="speechRateInput">
            语速 <span id="speechRateValue">0.82</span>
            <input id="speechRateInput" type="range" min="0.65" max="1.00" step="0.01" value="0.82" />
          </label>
          <label class="settings-check" for="clearSpeechInput">
            <input id="clearSpeechInput" type="checkbox" checked />
            清晰模式
          </label>
        </section>

        <section class="management-panel" aria-label="卡片管理">
          <div class="management-header">
            <h3>卡片管理</h3>
            <button class="text-button" id="clearButton" type="button">清空</button>
          </div>

          <form class="card-form" id="cardForm">
            <label class="upload-box" for="photoInput">
              <input id="photoInput" type="file" accept="image/*" capture="environment" />
              <span class="upload-title">拍照或上传图片</span>
              <span class="upload-hint" id="uploadHint">选择一张卡片照片，会自动识别英文</span>
            </label>

            <label>
              分组
              <input id="groupInput" type="text" list="groupOptions" autocomplete="off" placeholder="动物" />
              <datalist id="groupOptions"></datalist>
            </label>

            <label>
              英文
              <input id="englishInput" type="text" autocomplete="off" placeholder="apple" required />
            </label>

            <label>
              中文
              <input id="chineseInput" type="text" autocomplete="off" placeholder="苹果" required />
            </label>

            <p class="recognition-status" id="recognitionStatus">上传后会自动填写英文和中文，可手动修改。OCR 和在线翻译需要联网。</p>

            <button class="primary-button" type="submit">保存卡片</button>
          </form>

          <div class="list-header">
            <h3>已添加</h3>
            <span id="listTotal">0 张</span>
          </div>
          <div class="card-list" id="cardList"></div>
        </section>
      </aside>

      <section class="test-overlay" id="testOverlay" aria-label="测试模式" aria-hidden="true">
        <header class="test-header">
          <div class="test-status" id="testStatus">测试</div>
          <button class="text-button" id="closeTestButton" type="button">关闭</button>
        </header>

        <main class="test-main">
          <button class="test-nav previous" id="testPreviousButton" type="button" aria-label="上一张">&#8592;</button>
          <article class="test-card">
            <div class="test-photo">
              <img id="testCardImage" alt="" hidden />
              <div class="empty-illustration" id="testEmptyIllustration" aria-hidden="true">
                <div class="sun"></div>
                <div class="hill hill-one"></div>
                <div class="hill hill-two"></div>
                <div class="tree">
                  <span></span>
                  <span></span>
                </div>
              </div>
            </div>
            <div class="test-words">
              <p id="testCardCount">0 / 0</p>
              <h2 id="testEnglishWord">暂无卡片</h2>
              <p id="testChineseWord">请先选择有卡片的分组</p>
            </div>
          </article>
          <button class="test-nav next" id="testNextButton" type="button" aria-label="下一张">&#8594;</button>
        </main>

        <footer class="test-footer">
          <button class="speak-button english" id="testSpeakEnglishButton" type="button">
            <span class="button-main">English</span>
            <span class="button-sub">读英文</span>
          </button>
          <button class="speak-button chinese" id="testSpeakChineseButton" type="button">
            <span class="button-main">中文</span>
            <span class="button-sub">读中文</span>
          </button>
        </footer>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
